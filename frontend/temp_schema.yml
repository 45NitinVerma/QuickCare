openapi: 3.0.3
info:
  title: QuickCare API
  version: 1.0.0
  description: |-
    Backend API for QuickCare — a health management platform.

    ## Authentication
    All protected endpoints require a Bearer JWT token in the `Authorization` header:
    ```
    Authorization: Bearer <access_token>
    ```
    Obtain a token via **Login** or **Registration Step 2**.

    ## User Roles
    | ID | Role |
    |---|---|
    | 3 | Patient |
    | 7 | Clinic Owner |
    | 4 | Doctor |
paths:
  /api/appointments/doctor/:
    get:
      operationId: appointments_doctor_retrieve
      description: |-
        Doctor: view all appointments on their schedule.
        Supports ?date=YYYY-MM-DD and ?status= filters.
      tags:
      - appointments
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/appointments/doctor/{id}/:
    get:
      operationId: appointments_doctor_retrieve_2
      description: 'Doctor: confirm, complete, add notes, or cancel an appointment.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
    put:
      operationId: appointments_doctor_update
      description: 'Doctor: confirm, complete, add notes, or cancel an appointment.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/appointments/my/:
    get:
      operationId: appointments_my_retrieve
      description: |-
        GET  – list all appointments for the logged-in patient
        POST – book a new appointment
      tags:
      - appointments
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: appointments_my_create
      description: |-
        GET  – list all appointments for the logged-in patient
        POST – book a new appointment
      tags:
      - appointments
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/appointments/my/{id}/:
    get:
      operationId: appointments_my_retrieve_2
      description: 'Patient: get or cancel a specific appointment.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
    put:
      operationId: appointments_my_update
      description: Patient can only cancel their appointment.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - appointments
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/clinics/:
    get:
      operationId: clinics_retrieve
      tags:
      - Clinics
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Clinic'
          description: ''
    post:
      operationId: clinics_create
      tags:
      - Clinics
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Clinic'
          description: ''
  /api/clinics/{clinic_id}/:
    get:
      operationId: clinics_retrieve_2
      parameters:
      - in: path
        name: clinic_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Clinics
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Clinic'
          description: ''
    put:
      operationId: clinics_update
      parameters:
      - in: path
        name: clinic_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Clinics
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Clinic'
          description: ''
    delete:
      operationId: clinics_destroy
      parameters:
      - in: path
        name: clinic_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Clinics
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Clinic'
          description: ''
  /api/clinics/{clinic_id}/admission-docs/:
    get:
      operationId: clinics_admission_docs_retrieve
      description: "GET  (public)         – list all required admission documents
        for a clinic\nPOST (clinic owner \U0001F512) – add a new required document
        to the checklist"
      parameters:
      - in: path
        name: clinic_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Clinic Admission Documents
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicAdmissionDocument'
          description: ''
    post:
      operationId: clinics_admission_docs_create
      description: "GET  (public)         – list all required admission documents
        for a clinic\nPOST (clinic owner \U0001F512) – add a new required document
        to the checklist"
      parameters:
      - in: path
        name: clinic_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Clinic Admission Documents
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicAdmissionDocument'
          description: ''
  /api/clinics/{clinic_id}/admission-docs/{doc_id}/:
    put:
      operationId: clinics_admission_docs_update
      description: "PUT    (clinic owner \U0001F512) – update a required document
        entry\nDELETE (clinic owner \U0001F512) – remove a required document entry"
      parameters:
      - in: path
        name: clinic_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: doc_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Clinic Admission Documents
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicAdmissionDocument'
          description: ''
    delete:
      operationId: clinics_admission_docs_destroy
      description: "PUT    (clinic owner \U0001F512) – update a required document
        entry\nDELETE (clinic owner \U0001F512) – remove a required document entry"
      parameters:
      - in: path
        name: clinic_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: doc_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Clinic Admission Documents
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicAdmissionDocument'
          description: ''
  /api/clinics/{clinic_id}/admission-docs/patient/:
    get:
      operationId: clinics_admission_docs_patient_retrieve
      description: "GET /api/clinics/<clinic_id>/admission-docs/patient/   \U0001F512
        \ (Patient)\n\nReturns the admission document checklist for a clinic the patient\nhas
        an active/upcoming appointment at.\nPrevents patients from querying clinics
        they have no relationship with."
      parameters:
      - in: path
        name: clinic_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Clinic Admission Documents
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicAdmissionDocument'
          description: ''
  /api/clinics/{clinic_id}/members/:
    get:
      operationId: clinics_members_retrieve
      description: |-
        GET  – list all members of the clinic (owner only)
        POST – add a new doctor / lab member / receptionist by contact number
      parameters:
      - in: path
        name: clinic_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Clinic Members
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicMember'
          description: ''
    post:
      operationId: clinics_members_create
      description: |-
        Add a member by their contact number.
        - If the user does NOT exist → auto-create account with 8-digit temp password,
          send password to their contact, set is_partial_onboarding=True.
        - If the user already exists → add to clinic directly (status=active).
        - Doctors are enforced to belong to only ONE clinic at a time.
        - Auto-creates DoctorProfile for doctors.
      parameters:
      - in: path
        name: clinic_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Clinic Members
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicMember'
          description: ''
  /api/clinics/{clinic_id}/members/{member_id}/:
    get:
      operationId: clinics_members_retrieve_2
      description: |-
        GET    – get a single member's details (owner only)
        PUT    – update member role / department / notes (owner only)
        DELETE – remove (deactivate) a member from the clinic
      parameters:
      - in: path
        name: clinic_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: member_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Clinic Members
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicMember'
          description: ''
    put:
      operationId: clinics_members_update
      description: |-
        GET    – get a single member's details (owner only)
        PUT    – update member role / department / notes (owner only)
        DELETE – remove (deactivate) a member from the clinic
      parameters:
      - in: path
        name: clinic_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: member_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Clinic Members
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicMember'
          description: ''
    delete:
      operationId: clinics_members_destroy
      description: |-
        Soft-remove: sets status to 'inactive' and records left_at date.
        Does NOT delete the user account.
      parameters:
      - in: path
        name: clinic_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: member_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Clinic Members
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicMember'
          description: ''
  /api/clinics/{clinic_id}/slots/:
    get:
      operationId: clinics_slots_retrieve
      description: |-
        GET  – list all time slots for a clinic (public)
