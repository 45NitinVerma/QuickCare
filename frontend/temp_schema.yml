      - id
      - patient
      - patient_name
    DocumentConsentStatusEnum:
      enum:
      - pending
      - granted
      - revoked
      - expired
      - rejected
      type: string
      description: |-
        * `pending` - Pending
        * `granted` - Granted
        * `revoked` - Revoked
        * `expired` - Expired
        * `rejected` - Rejected
    DocumentDocumentTypeEnum:
      enum:
      - prescription
      - lab_report
      - scan
      - discharge_summary
      - vaccination
      - insurance
      - other
      type: string
      description: |-
        * `prescription` - Prescription
        * `lab_report` - Lab Report
        * `scan` - Scan / Imaging
        * `discharge_summary` - Discharge Summary
        * `vaccination` - Vaccination Record
        * `insurance` - Insurance Document
        * `other` - Other
    GenderEnum:
      enum:
