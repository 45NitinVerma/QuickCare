          description: ''
    post:
      operationId: clinics_slots_create
      description: |-
        GET  – list all time slots for a clinic (public)
        POST – add a new time slot (owner only)
      parameters:
      - in: path
        name: clinic_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Clinic Time Slots
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicTimeSlot'
          description: ''
  /api/clinics/{clinic_id}/slots/{slot_id}/:
    put:
      operationId: clinics_slots_update
      description: |-
        PUT    – update a time slot (owner only)
        DELETE – deactivate a time slot (owner only)
      parameters:
      - in: path
        name: clinic_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: slot_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Clinic Time Slots
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicTimeSlot'
          description: ''
    delete:
      operationId: clinics_slots_destroy
      description: |-
        PUT    – update a time slot (owner only)
        DELETE – deactivate a time slot (owner only)
      parameters:
      - in: path
        name: clinic_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: slot_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Clinic Time Slots
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicTimeSlot'
          description: ''
  /api/clinics/my/memberships/:
    get:
      operationId: clinics_my_memberships_retrieve
      description: A doctor / lab member views all clinics they belong to.
      tags:
      - Clinic Members
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicMember'
          description: ''
  /api/clinics/onboarding/step3/:
    post:
      operationId: clinics_onboarding_step3_create
      description: |-
        CLINIC OWNER — Step 2 (requires JWT from user onboarding Step 1).

        Creates the clinic and initial time slots in one request.
        Sets the owner's is_complete_onboarding = True.

        POST /api/clinics/onboarding/step2/
        {
            "name": "City Care Clinic",
            "clinic_type": "clinic",
            "phone": "9876543210",
            "email": "citycare@example.com",
            "address": "12, MG Road",
            "city": "Jaipur",
            "state": "Rajasthan",
            "pincode": "302001",
            "description": "Multi-specialty clinic",
            "time_slots": [
                {"day_of_week": 0, "start_time": "09:00", "end_time": "13:00", "slot_duration_minutes": 15},
                {"day_of_week": 0, "start_time": "17:00", "end_time": "20:00", "slot_duration_minutes": 15},
                {"day_of_week": 1, "start_time": "09:00", "end_time": "13:00", "slot_duration_minutes": 15}
            ]
        }
      tags:
      - Clinic Owner Registration
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /api/clinics/public/:
    get:
      operationId: clinics_public_list
      description: |-
        Public endpoint: patients can browse clinics.
        Supports ?city= and ?name= search.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - clinics
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedClinicList'
          description: ''
  /api/doctors/:
    get:
      operationId: doctors_list
      description: |-
        Public: list all active, verified doctors that belong to at least one clinic.
        Filter by ?clinic=<uuid>, ?specialty=, ?city=, ?min_fee=, ?max_fee=, ?video=
      parameters:
      - in: query
        name: city
        schema:
          type: string
      - in: query
        name: clinic
        schema:
          type: string
          format: uuid
      - in: query
        name: max_fee
        schema:
          type: number
      - in: query
        name: min_fee
        schema:
          type: number
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: specialty
        schema:
          type: string
      - in: query
        name: video
        schema:
          type: boolean
      tags:
      - Doctors
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDoctorProfileList'
          description: ''
  /api/doctors/{doctor_id}/availability/:
    get:
      operationId: doctors_availability_retrieve
      description: |-
        GET  – public: get a doctor's availability at a specific clinic
               ?clinic_id=<uuid> to filter by clinic (optional)
        POST – doctor adds an availability slot for a clinic they belong to
        PUT  – doctor updates a slot (pass slot_id in request body)
        DELETE – doctor removes a slot (?slot_id=)
      parameters:
      - in: path
        name: doctor_id
        schema:
          type: integer
        required: true
      tags:
      - Doctor Availability
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorAvailability'
          description: ''
    post:
      operationId: doctors_availability_create
      description: |-
        GET  – public: get a doctor's availability at a specific clinic
               ?clinic_id=<uuid> to filter by clinic (optional)
        POST – doctor adds an availability slot for a clinic they belong to
        PUT  – doctor updates a slot (pass slot_id in request body)
        DELETE – doctor removes a slot (?slot_id=)
      parameters:
      - in: path
        name: doctor_id
        schema:
          type: integer
        required: true
      tags:
      - Doctor Availability
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorAvailability'
          description: ''
    put:
      operationId: doctors_availability_update
      description: |-
        GET  – public: get a doctor's availability at a specific clinic
               ?clinic_id=<uuid> to filter by clinic (optional)
        POST – doctor adds an availability slot for a clinic they belong to
        PUT  – doctor updates a slot (pass slot_id in request body)
        DELETE – doctor removes a slot (?slot_id=)
      parameters:
      - in: path
        name: doctor_id
        schema:
          type: integer
        required: true
      tags:
      - Doctor Availability
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorAvailability'
          description: ''
    delete:
      operationId: doctors_availability_destroy
      description: |-
        GET  – public: get a doctor's availability at a specific clinic
               ?clinic_id=<uuid> to filter by clinic (optional)
        POST – doctor adds an availability slot for a clinic they belong to
        PUT  – doctor updates a slot (pass slot_id in request body)
        DELETE – doctor removes a slot (?slot_id=)
      parameters:
      - in: path
        name: doctor_id
        schema:
          type: integer
        required: true
      tags:
      - Doctor Availability
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorAvailability'
          description: ''
  /api/doctors/{doctor_id}/availability/slots/:
    get:
      operationId: doctors_availability_slots_retrieve
      description: |-
        Public: Returns free time slots for a doctor on a given date.
        Query params: ?date=YYYY-MM-DD  &clinic_id=<uuid> (optional)
      parameters:
      - in: path
        name: doctor_id
        schema:
          type: integer
        required: true
      tags:
      - Doctor Availability
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/doctors/{id}/:
    get:
      operationId: doctors_retrieve
      description: 'Public: get a single doctor''s full profile.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Doctors
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorProfile'
          description: ''
  /api/doctors/me/:
    get:
      operationId: doctors_me_retrieve
      description: |-
        Authenticated doctor: get or create/update own professional profile.
        Note: A DoctorProfile is auto-created when a clinic adds the doctor as a member.
      tags:
      - Doctors
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorProfile'
          description: ''
    put:
      operationId: doctors_me_update
      description: Doctor updates their own professional details.
      tags:
      - Doctors
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorProfile'
          description: ''
  /api/doctors/me/leaves/:
    get:
      operationId: doctors_me_leaves_retrieve
      tags:
      - Doctor Availability
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
