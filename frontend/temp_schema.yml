      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorLeave'
          description: ''
    delete:
      operationId: doctors_me_leaves_destroy
      tags:
      - Doctor Availability
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorLeave'
          description: ''
  /api/doctors/me/leaves/{leave_id}/:
    get:
      operationId: doctors_me_leaves_retrieve_2
      parameters:
      - in: path
        name: leave_id
        schema:
          type: integer
        required: true
      tags:
      - Doctor Availability
