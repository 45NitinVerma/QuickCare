components:
  schemas:
    AddressTypeEnum:
      enum:
      - home
      - work
      type: string
      description: |-
        * `home` - home
        * `work` - work
    BlankEnum:
      enum:
      - ''
    BloodGroupEnum:
      enum:
      - A+
      - A-
      - B+
      - B-
      - AB+
      - AB-
      - O+
      - O-
      type: string
      description: |-
        * `A+` - A+
        * `A-` - A-
        * `B+` - B+
        * `B-` - B-
        * `AB+` - AB+
        * `AB-` - AB-
        * `O+` - O+
        * `O-` - O-
    Clinic:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 200
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        clinic_type:
          $ref: '#/components/schemas/ClinicTypeEnum'
        owner:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        phone:
          type: string
          nullable: true
          maxLength: 15
        email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        address:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
          maxLength: 100
        state:
          type: string
          nullable: true
          maxLength: 100
        pincode:
          type: string
          nullable: true
          maxLength: 10
        registration_number:
          type: string
          nullable: true
          maxLength: 100
        logo:
          type: string
          format: uri
          nullable: true
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
        doctor_count:
          type: integer
          readOnly: true
        staff_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - doctor_count
      - id
      - name
      - owner
      - slug
      - staff_count
    ClinicAdmissionDocument:
      type: object
      description: Read serializer — returned to any caller (patient, public).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        document_name:
          type: string
          description: Human-readable name, e.g. 'Aadhar Card', 'CBC Blood Report'
          maxLength: 200
        document_type:
          $ref: '#/components/schemas/ClinicAdmissionDocumentDocumentTypeEnum'
        document_type_display:
          type: string
          readOnly: true
        is_mandatory:
          type: boolean
          description: True = patient must bring this; False = recommended but optional
        notes:
          type: string
          nullable: true
          description: Additional instructions for the patient, e.g. 'original + 2
            photocopies'
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - document_name
      - document_type_display
      - id
    ClinicAdmissionDocumentDocumentTypeEnum:
      enum:
      - id_proof
      - insurance
      - prescription
      - lab_report
      - imaging
      - vaccination
      - discharge_summary
      - other
      type: string
      description: |-
        * `id_proof` - ID Proof (Aadhar, PAN, Passport)
        * `insurance` - Insurance / TPA Card
        * `prescription` - Prescription / Referral Letter
        * `lab_report` - Lab / Blood Report
        * `imaging` - Imaging / X-Ray / MRI / CT Scan
        * `vaccination` - Vaccination Record
        * `discharge_summary` - Previous Discharge Summary
        * `other` - Other
    ClinicMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        clinic:
          type: string
          format: uuid
          readOnly: true
        clinic_name:
          type: string
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        member_role:
          $ref: '#/components/schemas/MemberRoleEnum'
        status:
          $ref: '#/components/schemas/ClinicMemberStatusEnum'
        department:
          type: string
          nullable: true
          maxLength: 100
        joined_at:
          type: string
          format: date
          nullable: true
        left_at:
          type: string
          format: date
          nullable: true
        notes:
          type: string
          nullable: true
          description: Internal notes about this member (e.g. visiting doctor)
        added_by_name:
          type: string
          readOnly: true
        invite_accepted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - added_by_name
      - clinic
      - clinic_name
      - created_at
      - id
      - invite_accepted_at
      - user
    ClinicMemberStatusEnum:
      enum:
      - pending
      - active
      - inactive
      type: string
      description: |-
        * `pending` - Pending
        * `active` - Active
        * `inactive` - Inactive
    ClinicOwnerStep1Request:
      type: object
      properties:
        contact:
          type: integer
        name:
          type: string
          minLength: 1
          maxLength: 100
        password:
          type: string
          writeOnly: true
          minLength: 6
      required:
      - contact
      - name
      - password
    ClinicTimeSlot:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        day_of_week:
          allOf:
          - $ref: '#/components/schemas/DayOfWeekEnum'
          minimum: 0
          maximum: 32767
        day_name:
          type: string
          readOnly: true
        start_time:
          type: string
          format: time
        end_time:
          type: string
          format: time
        slot_duration_minutes:
          type: integer
          maximum: 32767
          minimum: 0
          description: Duration of each appointment slot in minutes
        max_appointments:
          type: integer
          maximum: 32767
          minimum: 0
          description: Max appointments in this time window
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - day_name
      - day_of_week
      - end_time
      - id
      - start_time
    ClinicTypeEnum:
      enum:
      - clinic
      - hospital
      - diagnostic_center
      - polyclinic
      type: string
      description: |-
        * `clinic` - Clinic
        * `hospital` - Hospital
        * `diagnostic_center` - Diagnostic Center
        * `polyclinic` - Polyclinic
    DayEnum:
      enum:
      - monday
      - tuesday
      - wednesday
      - thursday
      - friday
      - saturday
      - sunday
      type: string
      description: |-
        * `monday` - Monday
        * `tuesday` - Tuesday
        * `wednesday` - Wednesday
        * `thursday` - Thursday
        * `friday` - Friday
        * `saturday` - Saturday
        * `sunday` - Sunday
    DayOfWeekEnum:
      enum:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      type: integer
      description: |-
        * `0` - Monday
        * `1` - Tuesday
        * `2` - Wednesday
        * `3` - Thursday
        * `4` - Friday
        * `5` - Saturday
        * `6` - Sunday
    DoctorAvailability:
      type: object
      properties:
        id:
          type: integer
